# Security audit exceptions — dev-only advisories
# All ignored advisories are in dev-only deps (solana-sdk, solana-client, litesvm)
# None are in the on-chain BPF binary. Tracked for resolution in GH#32 (Solana SDK upgrade)
#
# Dependency chain: solana-keypair -> ed25519-dalek-bip32 -> ed25519-dalek 1.0.1 -> curve25519-dalek 3.2.x
# This entire chain is dev-only (solana-sdk/solana-client/litesvm are [dev-dependencies]).
# The on-chain program (BPF target) never links these crates.
# Solana SDK 2.x is pinned to ed25519-dalek 1.x; upgrade to Solana SDK 4.x resolves this
# but is a major migration (breaking changes). Tracked separately.

[advisories]
ignore = [
    "RUSTSEC-2022-0093",  # ed25519-dalek <2.0 double-pk oracle attack — dev-only, not in BPF binary
    "RUSTSEC-2024-0344",  # curve25519-dalek timing variability — dev-only, not in BPF binary
]
